<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>프로필 카드</title>

<style>
body {
  background-color: #000000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: sans-serif;
}

.card {
  background: #f3f4f6;
  border-radius: 20px;
  padding: 30px;
  width: 500px;
  display: flex;
  gap: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 10px;
  object-fit: cover;
}

.content {
  flex: 1;
}

.title {
  font-size: 16px;
  font-weight: bold;
  color: #3b82f6;
  margin-bottom: 10px;
}

.name {
  font-size: 14px;
  margin-bottom: 10px;
  color: #333;
}

.desc {
  font-size: 13px;
  color: #555;
  line-height: 1.5;
  margin-bottom: 15px;
}

.icons {
  display: flex;
  gap: 10px;
}

.icon {
  width: 40px;
  height: 40px;
  border: 2px dashed #9ca3af;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="card">
  <img src="https://i.imgur.com/xZw4hyt.gif" class="avatar">

  <div class="content">
    <div class="title">"너 내 동료가 돼라."</div>

    <div class="name">
      오픈다드림러 · 성인 여성 · 2차CP 언급有 · 사담 多  
    </div>

    <div class="desc">
      (1) 1T1D 배려 x 직멘 x까지만 <br>
      (2) 성소수자 혐오, 원작 미소비 덕질 NG
    </div>

    <div class="icons">
      <div class="icon">📦</div>
      <a href="https://pushoong.com/ask/5860919852/" target="_blank">
  <div class="icon">📄</div>
</a>
      <div class="icon">📷</div>
    </div>
  </div>
</div>

</body>
</html>
